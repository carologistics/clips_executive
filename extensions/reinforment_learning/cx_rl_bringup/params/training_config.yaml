/**:
  ros__parameters:
    # storage_dir: defaults to ros logging dir

    agent_name: "cx_rl_agent"
    number_of_robots: 1

    training:
      retraining: false
      max_episodes: 500
      timesteps: 100000000

    env:
      entrypoint: "cx_rl_gym.cx_rl_gym:CXRLGym"

    model:
      learning_rate: 0.03
      gamma: 0.99
      gae_lambda: 0.95
      ent_coef: 0.0
      vf_coef: 0.5
      max_grad_norm: 0.5
      batch_size: 64
      n_steps: 5
      seed: 42
      verbose: 1
      wait_for_all_robots: false
